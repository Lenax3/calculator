<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Koi-culator</title>

    <link rel="stylesheet" href="css/styles.css">
    <script src="script.js" defer></script>

    <link rel="icon" href="favicon.png" type="image/png">

    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Jersey+25&family=Roboto+Slab:wght@100..900&family=Roboto:ital,wght@0,100..900;1,100..900&family=VT323&display=swap" rel="stylesheet">
</head>

<body>
    <div class="wrapper">

        <div class="koiculator">KOI-CULATOR</div>

        <div class="calculator">

            <div id="display">
                <div class="previous-operand"></div>
                <div class="current-operand"></div>
            </div>

            <div class="buttons">

                <button class="clear">AC</button>
                <button class="backspace">C</button>
                <button class="percent">%</button>
                <button class="operator">÷</button>

                <button class="number">7</button>
                <button class="number">8</button>
                <button class="number">9</button>
                <button class="operator">+</button>

                <button class="number">4</button>
                <button class="number">5</button>
                <button class="number">6</button>
                <button class="operator">-</button>

                <button class="number">1</button>
                <button class="number">2</button>
                <button class="number">3</button>
                <button class="operator">×</button>

                <button class="number">0</button>
                <button class="decimal">.</button>

                <button class="equals" id="equals">=</button>

            </div>

        </div>

    </div>
   <footer class="footer">
      <p>
        Copyright ©
        <script>
          document.write(new Date().getFullYear());
        </script>
        Lenax3
      </p>
      <a href="https://github.com/Lenax3" target="_blank">
        <img class="github-logo" src="github-mark.svg" />
      </a>
    </footer>
</body>
</html>
